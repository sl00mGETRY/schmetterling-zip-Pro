plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

ext {
    javafxVersion = '21.0.2'
}

dependencies {
    implementation "org.openjfx:javafx-base:${javafxVersion}:linux"
    implementation "org.openjfx:javafx-controls:${javafxVersion}:linux"
    implementation "org.openjfx:javafx-graphics:${javafxVersion}:linux"
}

application {
    mainClass = 'com.myashka.Launcher'
}

tasks.named('jar', Jar) {
    archiveBaseName = 'schmetterling-zip'
    archiveClassifier = 'all'
    archiveVersion = '1.0'

    manifest {
        attributes(
                'Main-Class': 'com.myashka.Launcher'
        )
    }

    from(configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }) {
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    }
}